apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: smart-store
  name: smart-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-store
  template:
    metadata:
      labels:
        app: smart-store
    spec:
      containers:
      - image: chirayupatle/smart-store:{{.Values.image.tag}}
        name: smart-store
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        ports:
        - containerPort: 8080